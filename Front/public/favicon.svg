<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- fondo redondeado oscuro -->
  <rect width="32" height="32" rx="8" fill="#1a1a1a"/>
  <!-- cuerpo del calendario -->
  <rect x="5" y="9" width="22" height="18" rx="3" fill="#C8A961"/>
  <!-- franja superior -->
  <rect x="5" y="9" width="22" height="7" rx="3" fill="#b8954f"/>
  <rect x="5" y="13" width="22" height="3" fill="#b8954f"/>
  <!-- asas del calendario -->
  <rect x="10" y="6" width="3" height="6" rx="1.5" fill="#ffffff"/>
  <rect x="19" y="6" width="3" height="6" rx="1.5" fill="#ffffff"/>
  <!-- punto central (cita) -->
  <circle cx="16" cy="20" r="3" fill="#1a1a1a"/>
  <circle cx="16" cy="20" r="1.5" fill="#C8A961"/>
</svg>
