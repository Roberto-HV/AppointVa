name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore Back/AppointVaAPI/AppointVaAPI.sln

      - name: Build
        run: dotnet build Back/AppointVaAPI/AppointVaAPI.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Back/AppointVaAPI/AppointVaAPI.sln --no-build --configuration Release --verbosity normal

  frontend-tests:
    name: Frontend — test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Front/package-lock.json

      - name: Install
        run: npm ci
        working-directory: Front

      - name: Test
        run: npm run test
        working-directory: Front

      - name: Build
        run: npm run build
        working-directory: Front
